name: Test advanced deployment inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          repo: my-repo
          owner: my-org
          ref: refs/heads/main
          sha: abc1234567890abcdef1234567890abcdef12345
          required-contexts: ""
          payload: '{"key":"value","version":1}'
          environment: production
          production-environment: "true"
          task: deploy
          auto-merge: "false"
          transient-environment: "false"
          auto-inactive: "true"
      - name: Assert step ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
