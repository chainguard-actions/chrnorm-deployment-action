name: Test deployment with payload and required-contexts
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          environment: staging
          initial-status: pending
          payload: '{"version":"1.0.0","deployer":"ci"}'
          required-contexts: ''
          github-base-url: 'https://api.github.com'
          task: deploy
          auto-merge: 'false'
          transient-environment: 'true'
          production-environment: 'false'
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          echo "deployment_id: ${{ steps.action.outputs.deployment_id }}"
          echo "PASS: action executed with payload and required-contexts inputs"
