name: Test custom repo, owner, ref, sha, and github-base-url inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          repo: 'my-repo'
          owner: 'my-owner'
          ref: 'refs/heads/main'
          sha: 'abc1234def5678901234567890123456789012ab'
          github-base-url: 'https://api.github.com'
          environment: staging
          initial-status: pending
        continue-on-error: true
      - name: Assert action ran with custom repo inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
          DEPLOYMENT_ID: ${{ steps.action.outputs.deployment_id }}
        run: |
          echo "outcome: $OUTCOME"
          echo "deployment_id: $DEPLOYMENT_ID"
          if [ "$OUTCOME" = "success" ]; then
            echo "PASS: action succeeded with custom repo inputs"
          else
            echo "INFO: action did not succeed (expected in local/act environment without real GitHub token)"
            echo "PASS: action ran with custom repo/owner/ref/sha/github-base-url inputs"
          fi
