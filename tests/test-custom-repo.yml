name: Test deployment with custom repo, owner, ref, sha, and github-base-url
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get current commit SHA
        id: git-info
        run: |
          SHA=$(git rev-parse HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Current SHA: $SHA"
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          repo: ${{ github.repository_owner != '' && github.event.repository.name || 'test-repo' }}
          owner: ${{ github.repository_owner }}
          ref: ${{ github.ref }}
          sha: ${{ steps.git-info.outputs.sha }}
          environment: staging
          initial-status: pending
          task: deploy
          auto-merge: 'false'
          transient-environment: 'true'
          auto-inactive: 'false'
          github-base-url: 'https://api.github.com'
      - name: Assert deployment_id is set
        env:
          DEPLOYMENT_ID: ${{ steps.action.outputs.deployment_id }}
        run: |
          echo "deployment_id: $DEPLOYMENT_ID"
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "FAIL: deployment_id output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert deployment_url is set
        env:
          DEPLOYMENT_URL: ${{ steps.action.outputs.deployment_url }}
        run: |
          echo "deployment_url: $DEPLOYMENT_URL"
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "FAIL: deployment_url output is empty"
            exit 1
          fi
          echo "PASS"
