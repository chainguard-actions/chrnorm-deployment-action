name: Test deployment with custom repo, owner, ref, sha, and github-base-url
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get current repo info
        id: repo-info
        run: |
          echo "owner=$(echo '${{ github.repository }}' | cut -d'/' -f1)" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | cut -d'/' -f2)" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "ref=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          owner: ${{ steps.repo-info.outputs.owner }}
          repo: ${{ steps.repo-info.outputs.repo }}
          ref: ${{ steps.repo-info.outputs.ref }}
          sha: ${{ steps.repo-info.outputs.sha }}
          environment: staging
          initial-status: pending
          required-contexts: ''
          github-base-url: 'https://api.github.com'
          auto-merge: 'false'
      - name: Assert deployment_id is set
        env:
          DEPLOYMENT_ID: ${{ steps.action.outputs.deployment_id }}
        run: |
          echo "deployment_id: $DEPLOYMENT_ID"
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "FAIL: deployment_id output is empty"
            exit 1
          fi
          echo "PASS"
