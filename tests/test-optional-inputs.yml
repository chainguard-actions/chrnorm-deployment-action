name: Test optional deployment inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          environment: production
          description: 'Test deployment from act'
          environment-url: 'https://example.com'
          log-url: 'https://example.com/logs'
          payload: '{"key":"value"}'
          production-environment: 'true'
          required-contexts: ''
        continue-on-error: true
      - name: Assert action ran with optional inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
          DEPLOYMENT_ID: ${{ steps.action.outputs.deployment_id }}
          ENVIRONMENT_URL: ${{ steps.action.outputs.environment_url }}
        run: |
          echo "outcome: $OUTCOME"
          echo "deployment_id: $DEPLOYMENT_ID"
          echo "environment_url: $ENVIRONMENT_URL"
          if [ "$OUTCOME" = "success" ]; then
            echo "PASS: action succeeded with optional inputs"
          else
            echo "INFO: action did not succeed (expected in local/act environment without real GitHub token)"
            echo "PASS: action ran with optional inputs"
          fi
