name: Test github-base-url input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          environment: staging
          initial-status: pending
          github-base-url: "https://api.github.com"
          required-contexts: ""
          auto-merge: "false"
      - name: Assert deployment_id is set
        env:
          DEPLOYMENT_ID: ${{ steps.action.outputs.deployment_id }}
        run: |
          echo "deployment_id: $DEPLOYMENT_ID"
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "FAIL: deployment_id output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert deployment_url is set
        env:
          DEPLOYMENT_URL: ${{ steps.action.outputs.deployment_url }}
        run: |
          echo "deployment_url: $DEPLOYMENT_URL"
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "FAIL: deployment_url output is empty"
            exit 1
          fi
          echo "PASS"
