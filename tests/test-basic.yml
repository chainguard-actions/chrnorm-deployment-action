name: Test basic deployment creation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          environment: staging
          initial-status: pending
          task: deploy
          auto-merge: 'false'
          transient-environment: 'false'
          auto-inactive: 'true'
        continue-on-error: true
      - name: Assert deployment_id output exists or action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
          DEPLOYMENT_ID: ${{ steps.action.outputs.deployment_id }}
          DEPLOYMENT_URL: ${{ steps.action.outputs.deployment_url }}
        run: |
          echo "outcome: $OUTCOME"
          echo "deployment_id: $DEPLOYMENT_ID"
          echo "deployment_url: $DEPLOYMENT_URL"
          if [ "$OUTCOME" = "success" ]; then
            echo "Action succeeded"
            if [ -z "$DEPLOYMENT_ID" ]; then
              echo "FAIL: deployment_id output is empty on success"
              exit 1
            fi
            echo "PASS: deployment_id=$DEPLOYMENT_ID"
          else
            echo "Action did not succeed (expected in test environment without real token)"
            echo "PASS: action ran and produced expected outcome"
          fi
