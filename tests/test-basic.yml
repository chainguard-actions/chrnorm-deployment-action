name: Test basic deployment creation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          environment: staging
          initial-status: pending
          description: "Test deployment from CI"
          log-url: "https://example.com/logs/123"
          environment-url: "https://staging.example.com"
      - name: Assert step ran (deployment_id may be empty in act without real token)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # In act without a real GitHub token the API call will fail,
          # but we verify the action was invoked (not skipped).
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
