name: Test deployment action with full inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          repo: my-repo
          owner: my-owner
          ref: refs/heads/main
          sha: abc1234567890abcdef1234567890abcdef12345
          description: 'Test deployment description'
          log-url: 'https://example.com/logs'
          environment: production
          environment-url: 'https://example.com'
          payload: '{"key":"value"}'
          required-contexts: ''
          production-environment: 'true'
          github-base-url: 'https://api.github.com'
      - name: Assert action ran (may fail due to fake token)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail with a fake token (API call fails)
          # We just verify it ran and produced an outcome
          if [ "${{ steps.action.outcome }}" = "" ]; then
            echo "FAIL: action did not produce an outcome"
            exit 1
          fi
          echo "PASS: action ran with outcome=${{ steps.action.outcome }}"
