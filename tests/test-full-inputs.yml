name: Test deployment with full optional inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          environment: production
          description: 'Test deployment from act workflow'
          environment-url: 'https://example.com'
          log-url: 'https://example.com/logs'
          production-environment: 'true'
          required-contexts: ''
          payload: '{"key":"value"}'
          initial-status: in_progress
          transient-environment: 'false'
          auto-merge: 'false'
          auto-inactive: 'true'
      - name: Assert deployment_id is set
        env:
          DEPLOYMENT_ID: ${{ steps.action.outputs.deployment_id }}
        run: |
          echo "deployment_id: $DEPLOYMENT_ID"
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "FAIL: deployment_id output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert environment_url is set
        env:
          ENV_URL: ${{ steps.action.outputs.environment_url }}
        run: |
          echo "environment_url: $ENV_URL"
          if [ -z "$ENV_URL" ]; then
            echo "FAIL: environment_url output is empty"
            exit 1
          fi
          echo "PASS"
