name: Test full input coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          repo: ${{ github.event.repository.name }}
          owner: ${{ github.repository_owner }}
          ref: main
          sha: ${{ github.sha }}
          environment: production
          initial-status: pending
          description: 'Test deployment from CI'
          log-url: 'https://example.com/logs/1'
          environment-url: 'https://example.com'
          payload: '{"version":"1.0.0","triggered_by":"test"}'
          required-contexts: ''
          production-environment: 'true'
          task: deploy
          auto-merge: 'false'
          transient-environment: 'false'
          auto-inactive: 'true'
        continue-on-error: true
      - name: Assert action ran with all inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
          DEPLOYMENT_ID: ${{ steps.action.outputs.deployment_id }}
          DEPLOYMENT_URL: ${{ steps.action.outputs.deployment_url }}
          ENVIRONMENT_URL: ${{ steps.action.outputs.environment_url }}
        run: |
          echo "outcome: $OUTCOME"
          echo "deployment_id: $DEPLOYMENT_ID"
          echo "deployment_url: $DEPLOYMENT_URL"
          echo "environment_url: $ENVIRONMENT_URL"
          if [ "$OUTCOME" = "success" ]; then
            echo "Action succeeded"
            if [ -z "$DEPLOYMENT_ID" ]; then
              echo "FAIL: deployment_id output is empty on success"
              exit 1
            fi
            echo "PASS: deployment_id=$DEPLOYMENT_ID"
          else
            echo "Action did not succeed (expected in test environment without real token)"
            echo "PASS: action ran with all inputs and produced expected outcome"
          fi
